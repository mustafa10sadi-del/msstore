name: Migrate Supabase Images to GitHub

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Migrate images and update Firebase
        env:
          GITHUB_TOKEN: ${{ github.token }}
          FIREBASE_DATABASE_URL: https://msstore-5c5f4-default-rtdb.firebaseio.com
          DEFAULT_SUPABASE_URL: https://hvnrwgjllajgjreegspp.supabase.co
          SUPABASE_BUCKET: products
        run: node scripts/migrate-supabase-images-to-github.js
