<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>تحديث الصور</title>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

<h2>اضغط الزر لتحويل الصور</h2>

<script>
// ضع إعدادات Firebase الخاصة بك هنا إذا ما موجودة مسبقاً
// firebase.initializeApp({ ... });

async function runImageUpdate() {
  if (!confirm("تحويل كل الصور إلى GitHub؟")) return;

  const snapshot = await db.ref("products").once("value");
  const products = snapshot.val() || {};

  let total = Object.keys(products).length;
  let count = 0;

  function getFile(url) {
    try {
      return decodeURIComponent(url.split('/').pop().split('?')[0]);
    } catch {
      return url;
    }
  }

  function toGithub(url) {
    if (!url) return "";
    const file = getFile(url);

    if (!file.match(/\.(jpg|jpeg|png|webp|gif)$/i)) return url;

    return "https://msstore95.github.io/images/" + file;
  }

  for (let id in products) {
    let p = products[id];

    let images = [];

    if (Array.isArray(p.images)) {
      images = p.images;
    } else if (typeof p.image === "string") {
      images = [p.image];
    }

    let newImages = images.map(toGithub);

    await db.ref("products/" + id).update({
      images: newImages,
      image: newImages[0] || ""
    });

    count++;
    console.log(count + " / " + total);
  }

  alert("تم تحويل الصور إلى GitHub ✅");
}

document.addEventListener("DOMContentLoaded", () => {
  const btn = document.createElement("button");
  btn.innerText = "تحديث كل الصور";
  btn.style.position = "fixed";
  btn.style.bottom = "20px";
  btn.style.right = "20px";
  btn.style.zIndex = "9999";
  btn.style.padding = "10px 15px";
  btn.style.background = "#000";
  btn.style.color = "#fff";
  btn.style.border = "none";
  btn.style.borderRadius = "8px";

  btn.onclick = runImageUpdate;

  document.body.appendChild(btn);
});
</script>

</body>
</html>
