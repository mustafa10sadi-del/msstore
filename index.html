<!DOCTYPE html>

<meta charset="UTF-8">

<body>

<h2 style="text-align:center">نسخة مصححة بالكامل</h2>

<script>
const USE_GITHUB_UPLOAD = true;
const GITHUB_REPO = "your/repo";
const GITHUB_BRANCH = "main";
const GITHUB_TOKEN = "PUT_YOUR_TOKEN";

async function fileToDataUrl(file){
  return new Promise((resolve, reject)=>{
    const reader = new FileReader();
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function uploadImageToGitHub(file){
  const dataUrl = await fileToDataUrl(file);
  const base64 = dataUrl.split(",")[1];

  const fileName = "img_" + Date.now() + ".jpg";
  const path = "images/" + fileName;

  const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${path}`,{
    method:"PUT",
    headers:{
      "Authorization":`Bearer ${GITHUB_TOKEN}`,
      "Content-Type":"application/json"
    },
    body:JSON.stringify({
      message:"upload",
      content:base64,
      branch:GITHUB_BRANCH
    })
  });

  const data = await res.json();
  if(!res.ok) throw new Error("upload fail");

  // FIXED LINK HERE
  return `https://cdn.jsdelivr.net/gh/${GITHUB_REPO}@${GITHUB_BRANCH}/${path}`;
}

console.log("READY");
</script>

</body>
</html>
